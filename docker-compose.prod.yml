# DevScope 生产环境 Docker Compose 配置
# 用法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 注意: 生产环境使用 GHCR 镜像，需要先登录:
#   echo $GITHUB_TOKEN | docker login ghcr.io -u YOUR_USERNAME --password-stdin

version: '3.8'

services:
  # PostgreSQL - 加固安全配置
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # 只绑定本地，不对外暴露
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devscope-network

  # API 服务 - 使用 GHCR 镜像
  api:
    image: ghcr.io/baisiqi6/devscope/api:latest
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/devscope
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      BGE_API_URL: ${BGE_API_URL:-https://api.siliconflow.cn/v1}
      BGE_MODEL_NAME: ${BGE_MODEL_NAME:-BAAI/bge-m3}
      LANGTUM_API_KEY: ${LANGTUM_API_KEY:-}
      LANGTUM_BASE_URL: ${LANGTUM_BASE_URL:-https://demo.langcore.cn}
      ENABLE_SCHEDULER: "true"
      NODE_ENV: production
      PORT: 3001
    ports:
      - "127.0.0.1:3001:3001"  # 只绑定本地，通过 Nginx 对外
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devscope-network

  # Web 服务 - 使用 GHCR 镜像
  web:
    image: ghcr.io/baisiqi6/devscope/web:latest
    environment:
      API_REWRITE_TARGET: http://api:3001
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"  # 只绑定本地，通过 Nginx 对外
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - devscope-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: devscope-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - devscope-network

networks:
  devscope-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
