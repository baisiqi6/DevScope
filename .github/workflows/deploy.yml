name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR 要求全小写，github.repository 保留大小写 DevScope 会导致推送失败
  IMAGE_NAME_API: baisiqi6/devscope/api
  IMAGE_NAME_WEB: baisiqi6/devscope/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.120.41.136
          username: devscope
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            cd /home/devscope/DevScope

            # 拉取最新配置文件（失败不阻断部署，镜像已由 CI 构建好）
            git pull origin main || echo "git pull failed, using current code"

            # 用 PAT 登录 GHCR（GITHUB_TOKEN 无法在 SSH 远程使用）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u baisiqi6 --password-stdin

            # 拉取最新镜像（只拉 API 和 Web，不动 postgres 和 nginx）
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api web

            # 重启服务（只重启变更的服务，避免数据库中断）
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api web

            # 等待服务启动
            sleep 10

            # 推送数据库 schema 变更
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T -w /app api pnpm --filter @devscope/db db:push 2>&1 || echo "db:push failed, may need manual migration"

            # 健康检查
            if ! curl -sf http://localhost:3100/trpc/health > /dev/null 2>&1; then
              echo "API health check failed"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 api
              exit 1
            fi

            if ! curl -sf http://localhost > /dev/null 2>&1; then
              echo "Web health check failed"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 web nginx
              exit 1
            fi

            # 清理旧镜像
            docker image prune -f

            echo "Deployment completed successfully!"
