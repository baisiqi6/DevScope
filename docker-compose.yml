# DevScope Docker Compose 配置
# 开发环境: docker-compose up -d
# 生产环境: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # PostgreSQL 数据库（带 pgvector 扩展）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devscope-postgres
    environment:
      POSTGRES_DB: devscope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devscope-network

  # API 服务
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devscope-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/devscope
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      BGE_API_URL: ${BGE_API_URL:-https://api.siliconflow.cn/v1}
      BGE_MODEL_NAME: ${BGE_MODEL_NAME:-BAAI/bge-m3}
      NODE_ENV: production
      PORT: 3100
    ports:
      - '127.0.0.1:3100:3100'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devscope-network

  # 持久任务 Worker（不对外暴露端口）
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: devscope-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/devscope
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      WORKER_LEASE_DURATION_MS: ${WORKER_LEASE_DURATION_MS:-300000}
      WORKER_RECOVERY_INTERVAL_MS: ${WORKER_RECOVERY_INTERVAL_MS:-60000}
      WORKER_RETRY_DELAY_MS: ${WORKER_RETRY_DELAY_MS:-60000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devscope-network

  # Web 服务
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devscope-web
    environment:
      NODE_ENV: production
      PORT: 3000
      API_REWRITE_TARGET: http://api:3100
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - devscope-network

networks:
  devscope-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
